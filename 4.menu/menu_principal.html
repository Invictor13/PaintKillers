<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paint Killers - Main Menu</title>
    <!-- Fonte moderna e elegante do Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #050507;
            --color-text: #ffffff;
            --color-muted: #555566;
            --color-primary: #ff007f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Fundo Dinâmico (Canvas + Vignette) */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(5, 5, 7, 0.8) 100%);
            z-index: 1;
            pointer-events: none;
        }

        .grain {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Container do Menu */
        .menu-wrapper {
            position: absolute;
            top: 50%;
            left: 10%;
            transform: translateY(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        /* Título do Jogo */
        .title-container {
            user-select: none;
        }

        .title {
            font-size: 7rem;
            font-weight: 900;
            line-height: 0.85;
            letter-spacing: -2px;
            text-transform: uppercase;
        }

        .title .paint {
            color: #ffffff;
            display: block;
        }

        .title .killers {
            color: transparent;
            -webkit-text-stroke: 2px rgba(255, 255, 255, 0.8);
            display: block;
            transition: color 0.5s ease, -webkit-text-stroke 0.5s ease;
        }

        .subtitle {
            font-size: 1rem;
            font-weight: 300;
            letter-spacing: 8px;
            color: var(--color-muted);
            margin-top: 15px;
            text-transform: uppercase;
        }

        /* Lista de Navegação */
        .nav-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .nav-item {
            position: relative;
            font-size: 2.2rem;
            font-weight: 600;
            color: var(--color-muted);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: fit-content;
            padding-left: 20px;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 0%;
            background-color: var(--hover-color, #fff);
            transition: height 0.3s ease, box-shadow 0.3s ease;
            border-radius: 2px;
        }

        .nav-item:hover {
            color: #ffffff;
            transform: translateX(15px);
            letter-spacing: 3px;
        }

        .nav-item:hover::before {
            height: 100%;
            box-shadow: 0 0 15px var(--hover-color, #fff);
        }

        /* Detalhes de Interface (Versão, etc) */
        .footer-info {
            position: absolute;
            bottom: 30px;
            left: 10%;
            z-index: 10;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--color-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .decorative-line {
            position: absolute;
            top: 0;
            left: 5%;
            width: 1px;
            height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.1), transparent);
            z-index: 10;
        }
    </style>
</head>
<body>

    <!-- Fundo -->
    <div id="canvas-container">
        <canvas id="bg-canvas"></canvas>
    </div>
    <div class="vignette"></div>
    <div class="grain"></div>
    <div class="decorative-line"></div>

    <!-- UI do Menu -->
    <div class="menu-wrapper">
        <div class="title-container">
            <h1 class="title">
                <span class="paint">Paint</span>
                <span class="killers" id="title-killers">Killers</span>
            </h1>
            <div class="subtitle">Tactical Simulation</div>
        </div>

        <ul class="nav-menu">
            <li class="nav-item" data-color="#00f3ff">Selecionar Modo de Jogo</li>
            <li class="nav-item" data-color="#dfff00">Personalizar Jogador</li>
            <li class="nav-item" data-color="#ff007f">Arena de Treino</li>
            <li class="nav-item" data-color="#ff3333">Sair</li>
        </ul>
    </div>

    <div class="footer-info">
        V 1.0.4 // BATTLE NET CONNECTED
    </div>

    <script>
        // ==========================================
        // 1. SISTEMA DE AUDIO (Sintetizador Procedural)
        // ==========================================
        // Usamos Web Audio API para gerar sons elegantes sem precisar de arquivos externos.
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playHoverSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();

            osc.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);

            // Som de "Tick" tecnológico e suave
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.05);

            filter.type = 'highpass';
            filter.frequency.value = 1000;

            gain.gain.setValueAtTime(0.0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);

            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // ==========================================
        // 2. LÓGICA DE INTERAÇÃO DO MENU
        // ==========================================
        const navItems = document.querySelectorAll('.nav-item');
        const titleKillers = document.getElementById('title-killers');
        let targetParticleColor = { r: 85, g: 85, b: 102 }; // Cor neutra inicial (muted)

        // Função para converter Hex para RGB
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }

        navItems.forEach(item => {
            // Define a variável CSS para a cor da barra de hover
            const color = item.getAttribute('data-color');
            item.style.setProperty('--hover-color', color);

            item.addEventListener('mouseenter', () => {
                playHoverSound();
                
                // Muda a cor da palavra "KILLERS" para combinar com a opção
                titleKillers.style.color = 'transparent';
                titleKillers.style.webkitTextStroke = `2px ${color}`;
                titleKillers.style.textShadow = `0 0 30px ${color}40`;

                // Define a nova cor alvo para as partículas do fundo
                targetParticleColor = hexToRgb(color);
            });

            item.addEventListener('mouseleave', () => {
                // Retorna ao estado inicial
                titleKillers.style.color = 'transparent';
                titleKillers.style.webkitTextStroke = `2px rgba(255, 255, 255, 0.8)`;
                titleKillers.style.textShadow = 'none';
                
                targetParticleColor = { r: 85, g: 85, b: 102 }; // Volta pro cinza azulado
            });

            item.addEventListener('click', () => {
                // Efeito visual de clique (simulação de carregamento)
                item.style.transform = 'translateX(25px) scale(0.98)';
                setTimeout(() => {
                    item.style.transform = 'translateX(15px) scale(1)';
                }, 100);
            });
        });

        // ==========================================
        // 3. BACKGROUND DINÂMICO (CANVAS PARTICLES)
        // ==========================================
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let particles = [];
        let currentParticleColor = { r: 85, g: 85, b: 102 };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 4 + 1;
                // Movimento lento e fluido (elegante)
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.alpha = Math.random() * 0.5 + 0.1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Reposiciona se sair da tela (efeito contínuo)
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${Math.floor(currentParticleColor.r)}, ${Math.floor(currentParticleColor.g)}, ${Math.floor(currentParticleColor.b)}, ${this.alpha})`;
                ctx.fill();

                // Brilho extra
                ctx.shadowBlur = 15;
                ctx.shadowColor = `rgb(${Math.floor(currentParticleColor.r)}, ${Math.floor(currentParticleColor.g)}, ${Math.floor(currentParticleColor.b)})`;
            }
        }

        // Cria as partículas
        for (let i = 0; i < 80; i++) {
            particles.push(new Particle());
        }

        function animateCanvas() {
            ctx.clearRect(0, 0, width, height);

            // Interpolação suave da cor atual para a cor alvo (efeito "fade" elegante)
            currentParticleColor.r += (targetParticleColor.r - currentParticleColor.r) * 0.05;
            currentParticleColor.g += (targetParticleColor.g - currentParticleColor.g) * 0.05;
            currentParticleColor.b += (targetParticleColor.b - currentParticleColor.b) * 0.05;

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animateCanvas);
        }

        animateCanvas();
    </script>
</body>
</html>
