<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operação Deserto 3D - Paintball Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #d2b48c; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        
        #ui-panel {
            position: absolute; top: 20px; left: 20px;
            background: rgba(28, 25, 23, 0.95); backdrop-filter: blur(12px);
            padding: 24px; border-radius: 12px; border: 1px solid rgba(217, 119, 6, 0.3);
            color: #ffedd5; box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            z-index: 100; width: 360px;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s;
        }
        #ui-panel.hidden { transform: translateX(-120%); opacity: 0; pointer-events: none; }
        
        #controls-help {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(0,0,0,0.8); color: #fbbf24; padding: 15px; border-radius: 8px;
            font-size: 0.8rem; pointer-events: none; border: 1px solid rgba(217, 119, 6, 0.2);
            transition: opacity 0.4s; text-transform: uppercase; letter-spacing: 0.5px;
        }
        #controls-help.hidden { opacity: 0; }

        .btn {
            width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 6px;
            font-weight: 900; text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; transition: all 0.2s; border: none; font-size: 0.75rem;
        }
        .btn-desert { background: #d97706; color: white; border-bottom: 4px solid #92400e; }
        .btn-desert:hover { background: #f59e0b; }
        .btn-desert:active { transform: translateY(2px); border-bottom: 1px solid #92400e; }
        
        .btn-outpost { background: #4b5563; color: white; border-bottom: 4px solid #1f2937; }
        .btn-outpost:hover { background: #6b7280; }
        .btn-outpost:active { transform: translateY(2px); border-bottom: 1px solid #1f2937; }

        #toggle-hud-btn {
            position: absolute; top: 20px; right: 20px;
            background: rgba(28, 25, 23, 0.8); color: #fbbf24; border: 1px solid rgba(217, 119, 6, 0.4);
            padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: bold;
            z-index: 200; backdrop-filter: blur(5px); transition: all 0.2s; font-size: 0.7rem;
        }
        #toggle-hud-btn:hover { background: #d97706; color: white; }
        
        .hud-select {
            width: 100%; background: rgba(0, 0, 0, 0.6); color: #fbbf24;
            border: 1px solid rgba(217, 119, 6, 0.3); padding: 10px; border-radius: 4px;
            margin-bottom: 12px; outline: none; font-size: 0.85rem;
        }

        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; margin: 12px 0; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 18px; width: 18px; border-radius: 2px;
            background: #f59e0b; cursor: pointer; margin-top: -7px; box-shadow: 0 0 15px rgba(245, 158, 11, 0.5);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; cursor: pointer; background: rgba(255,255,255,0.1); border-radius: 2px;
        }
    </style>
</head>
<body>

    <button id="toggle-hud-btn">OPERAÇÃO: OCULTAR</button>

    <div id="ui-panel">
        <h1 class="text-3xl font-black text-orange-500 mb-1 italic tracking-tighter">DESERT TACTICAL</h1>
        <p class="text-[10px] text-orange-300 opacity-60 mb-6 uppercase tracking-[0.3em]">Ambiente Simulado v2.0</p>
        
        <button id="btn-woodsball" class="btn btn-desert">Gerar Canyon & Dunas</button>
        <button id="btn-speedball" class="btn btn-outpost">Gerar Outpost Militar</button>
        
        <div class="mt-6 pt-6 border-t border-orange-900/50">
            <h3 class="font-black text-xs text-orange-200 mb-4 uppercase tracking-widest flex items-center">
                <span class="w-2 h-2 bg-orange-500 rounded-full mr-2 animate-pulse"></span>
                Controle Atmosférico
            </h3>
            
            <div class="flex justify-between text-[10px] text-orange-400 font-bold mb-1 uppercase">
                <label>Ciclo Solar</label>
                <span id="time-display" class="font-mono bg-black px-2 py-0.5 rounded text-orange-500">12:00</span>
            </div>
            <input type="range" id="slider-time" min="0" max="24" step="0.1" value="12">

            <label class="text-[10px] text-orange-400 font-bold mt-4 block mb-1 uppercase tracking-wider">Protocolo Climático</label>
            <select id="sel-weather" class="hud-select">
                <option value="clear" selected>Céu Limpo (Calor Extremo)</option>
                <option value="cloudy">Poeira em Suspensão</option>
                <option value="wind">Ventos de Santa Ana</option>
                <option value="fog">Miragem Térmica</option>
                <option value="rain_light">Oásis Transitório (Chuva)</option>
                <option value="storm">Tempestade de Areia Elétrica</option>
                <option value="snow">HABOOB (Tempestade de Areia)</option>
            </select>
        </div>

        <div class="mt-4 p-3 bg-black/40 rounded border border-white/5">
            <p class="text-[9px] text-gray-500 leading-relaxed uppercase">
                O modo <b>Haboob</b> substitui a neve por partículas de areia densa, reduzindo a visibilidade e aplicando força de arrasto simulada nos elementos flexíveis.
            </p>
        </div>
    </div>

    <div id="controls-help">
        <p>🖱️ <b>Orbit:</b> Clique Esq</p>
        <p>🖱️ <b>Pan:</b> Clique Dir</p>
        <p>⚙️ <b>Zoom:</b> ScrollWheel</p>
    </div>

    <script>
        // ==========================================
        // ENGINE & CONFIGURAÇÕES TÁTICAS
        // ==========================================
        const ARENA_LENGTH = 160;
        const ARENA_WIDTH = 90;   
        let mode = 'woodsball'; 

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2('#d2b48c', 0.0035); 

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 3500);
        camera.position.set(0, 100, 160);

        const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.04;
        controls.maxPolarAngle = Math.PI / 2.05; 

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffeedd, 1.3);
        sunLight.castShadow = true;
        sunLight.shadow.camera.left = -160; sunLight.shadow.camera.right = 160;
        sunLight.shadow.camera.top = 160; sunLight.shadow.camera.bottom = -160;
        sunLight.shadow.mapSize.width = 4096; sunLight.shadow.mapSize.height = 4096;
        sunLight.shadow.bias = -0.0003;
        scene.add(sunLight);

        let spawnQueue = [];
        let isSpawning = false;

        function queueForSpawn(obj) {
            obj.userData.targetScale = obj.scale.clone();
            obj.scale.set(0.001, 0.001, 0.001);
            obj.visible = false;
            spawnQueue.push(obj);
        }

        // ==========================================
        // SEED E TEXTURAS PROCEDURAIS (SAND EDITION)
        // ==========================================
        let mapSeed = {
            offsetX: 0, offsetZ: 0,
            canyonOffset: 0, canyonCurve: 0.04,
            hillSize: 18, duneFrequency: 0.02
        };

        function randomizeMapSeed() {
            mapSeed.offsetX = Math.random() * 5000;
            mapSeed.offsetZ = Math.random() * 5000;
            mapSeed.canyonOffset = (Math.random() - 0.5) * 60; 
            mapSeed.canyonCurve = 0.015 + Math.random() * 0.04;
            mapSeed.hillSize = 12 + Math.random() * 14; 
            mapSeed.duneFrequency = 0.01 + Math.random() * 0.02;
        }

        function createProceduralTexture(type, baseColor, noiseColor) {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = baseColor; ctx.fillRect(0, 0, 512, 512);
            ctx.fillStyle = noiseColor;
            
            const count = type === 'sand' ? 15000 : 8000;
            for(let i=0; i<count; i++) {
                const x = Math.random() * 512; const y = Math.random() * 512;
                ctx.globalAlpha = Math.random() * 0.4;
                if (type === 'sand') {
                    ctx.fillRect(x, y, 1.5, 1.5);
                } else if (type === 'cactus') {
                    ctx.globalAlpha = 0.1;
                    ctx.fillRect(x, y, 1, 25);
                } else if (type === 'adobe') {
                    ctx.globalAlpha = 0.2;
                    ctx.fillRect(x, y, 4, 3);
                }
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping; texture.wrapT = THREE.RepeatWrapping;
            return texture;
        }

        const texSand = createProceduralTexture('sand', '#d2b48c', '#c3a37a');
        const texAdobe = createProceduralTexture('adobe', '#b38b6d', '#8b6d5c');
        const texCactus = createProceduralTexture('cactus', '#4d632c', '#3a4a21');
        const texNet = (function() {
            const c = document.createElement('canvas'); c.width = 64; c.height = 64;
            const ctx = c.getContext('2d'); ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(32,0); ctx.lineTo(64,32); ctx.lineTo(32,64); ctx.lineTo(0,32); ctx.closePath(); ctx.stroke();
            const t = new THREE.CanvasTexture(c); t.wrapS = THREE.RepeatWrapping; t.wrapT = THREE.RepeatWrapping; return t;
        })();
        texSand.repeat.set(20, 20); texNet.repeat.set(80, 5);

        const materials = {
            sand: new THREE.MeshStandardMaterial({ map: texSand, roughness: 1.0 }),
            adobe: new THREE.MeshStandardMaterial({ map: texAdobe, roughness: 0.9, flatShading: false }),
            cactus: new THREE.MeshStandardMaterial({ map: texCactus, roughness: 0.8 }),
            wood: new THREE.MeshStandardMaterial({ color: '#5c4a3d', roughness: 0.9 }),
            net: new THREE.MeshStandardMaterial({ map: texNet, transparent: true, opacity: 0.65, side: THREE.DoubleSide }),
            mountain: new THREE.MeshStandardMaterial({ color: '#8b6d5c', roughness: 1.0, flatShading: true }),
            cloud: new THREE.MeshLambertMaterial({ color: '#ffe4b5', transparent: true, opacity: 0.5 }),
            canyonWater: new THREE.MeshStandardMaterial({ color: '#1ca3ec', transparent: true, opacity: 0.6, metalness: 0.2, roughness: 0.1 }),
            teamRed: new THREE.MeshStandardMaterial({ color: '#dc2626', roughness: 0.5 }),
            teamBlue: new THREE.MeshStandardMaterial({ color: '#2563eb', roughness: 0.5 }),
            flagPole: new THREE.MeshStandardMaterial({ color: '#94a3b8', metalness: 0.6 }),
            paintRed: new THREE.MeshStandardMaterial({ color: '#ff0044', transparent: true, opacity: 0.85, roughness: 0.2 }),
            paintBlue: new THREE.MeshStandardMaterial({ color: '#00ccff', transparent: true, opacity: 0.85, roughness: 0.2 })
        };

        const arenaGroup = new THREE.Group();
        const backgroundGroup = new THREE.Group();
        scene.add(arenaGroup, backgroundGroup);
        
        let groundMesh, waterMesh;
        const animatedObjects = { cactus: [], flags: [], clouds: [], turbines: [], growing: [], growingTerrain: null };
        let worldState = { windSpeed: 1.0, rainIntensity: 0, sandstormIntensity: 0, isStorm: false, lightningFlash: 0 };
        
        let rainParticles, sandParticles;
        const particleCount = 6000;
        
        function buildWeatherSystems() {
            // Chuva (Rara no deserto)
            const rGeo = new THREE.BufferGeometry(); const rPos = new Float32Array(particleCount * 3);
            for(let i=0; i<particleCount*3; i+=3) { rPos[i] = (Math.random()-0.5)*500; rPos[i+1] = Math.random()*200; rPos[i+2] = (Math.random()-0.5)*500; }
            rGeo.setAttribute('position', new THREE.BufferAttribute(rPos, 3));
            rainParticles = new THREE.Points(rGeo, new THREE.PointsMaterial({ color: 0xaaaaaa, size: 0.5, transparent: true, opacity: 0.4 }));
            rainParticles.visible = false; scene.add(rainParticles);

            // Tempestade de Areia (Haboob)
            const sGeo = new THREE.BufferGeometry(); const sPos = new Float32Array(particleCount * 3);
            for(let i=0; i<particleCount*3; i+=3) { sPos[i] = (Math.random()-0.5)*600; sPos[i+1] = Math.random()*120; sPos[i+2] = (Math.random()-0.5)*600; }
            sGeo.setAttribute('position', new THREE.BufferAttribute(sPos, 3));
            sandParticles = new THREE.Points(sGeo, new THREE.PointsMaterial({ color: 0xcd853f, size: 2.0, transparent: true, opacity: 0.7 }));
            sandParticles.visible = false; scene.add(sandParticles);
        }
        buildWeatherSystems();

        // ==========================================
        // MATEMÁTICA DO RELEVO (Sincronização Absoluta)
        // ==========================================
        function getTerrainHeight(x, z) {
            let baseExt = 0;
            // Extensão fora da arena (Canyons e dunas distantes)
            if (Math.abs(x) > ARENA_LENGTH/2 || Math.abs(z) > ARENA_WIDTH/2) {
                let dist = Math.sqrt(x*x + z*z);
                baseExt = Math.max(0, (dist - 80) * 0.18);
                let wave = Math.sin((x + mapSeed.offsetX) * 0.025) * Math.cos((z + mapSeed.offsetZ) * 0.025);
                baseExt += (wave * wave) * 18; 
            }

            let canyonDepth = 0;
            if (mode === 'woodsball') {
                // Canyon seco (Wadi)
                let canyonPathX = (ARENA_LENGTH / 2 + 45 + mapSeed.canyonOffset) + Math.sin(z * mapSeed.canyonCurve) * 35;
                let distToCanyon = Math.abs(x - canyonPathX);
                if (distToCanyon < 18) {
                    let carve = Math.cos((distToCanyon / 18) * (Math.PI / 2)); 
                    canyonDepth = carve * (baseExt + 5); 
                }
            }

            if (mode === 'speedball') return baseExt - canyonDepth;

            // Relevo interno
            const distFromCenterX = Math.abs(x);
            let edgeFlatten = 1;
            if (distFromCenterX > ARENA_LENGTH/2 - 30) edgeFlatten = Math.max(0, (ARENA_LENGTH/2 - distFromCenterX) / 30);
            
            const distFromCenter = Math.sqrt(x*x + z*z);
            let hill = 0;
            if (distFromCenter < 45) hill = Math.cos((distFromCenter / 45) * (Math.PI/2)) * mapSeed.hillSize;
            
            let noise = Math.sin((x + mapSeed.offsetX) * 0.05) * Math.cos((z + mapSeed.offsetZ) * 0.05) * 6;
            noise += Math.sin((x + mapSeed.offsetX) * 0.12 + (z + mapSeed.offsetZ) * 0.08) * 3.0;

            return ((noise + hill) * edgeFlatten) + baseExt - canyonDepth;
        }

        // ==========================================
        // CONSTRUTORES DE OBJETOS
        // ==========================================
        function createWindTurbine(x, z, angle) {
            const t = new THREE.Group();
            const y = getTerrainHeight(x, z) - 2;
            const mast = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 1.4, 55, 8).translate(0, 27.5, 0), materials.adobe);
            const head = new THREE.Mesh(new THREE.BoxGeometry(2.5, 3, 7).translate(0, 55, 1.5), materials.adobe);
            t.add(mast, head);
            const rotor = new THREE.Group(); rotor.position.set(0, 55, -2);
            rotor.add(new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.2, 3, 8).rotateX(Math.PI/2), materials.adobe));
            for(let i=0; i<3; i++) {
                const blade = new THREE.Mesh(new THREE.BoxGeometry(0.6, 25, 0.2).translate(0, 12.5, 0), materials.adobe);
                blade.rotation.z = (i * Math.PI * 2) / 3; rotor.add(blade);
            }
            t.add(rotor); t.position.set(x, y, z); t.rotation.y = angle;
            backgroundGroup.add(t); animatedObjects.turbines.push(rotor);
            queueForSpawn(t);
        }

        function buildSkyBox() {
            // Montanhas de Areia (Dunas Gigantes)
            const mGeo = new THREE.ConeGeometry(70, 150, 4); mGeo.translate(0, 75, 0);
            for(let i=0; i<18; i++) {
                const angle = (i / 18) * Math.PI * 2 + Math.random();
                const radius = 350 + Math.random() * 120;
                const m = new THREE.Mesh(mGeo, materials.mountain);
                m.position.set(Math.cos(angle)*radius, -25, Math.sin(angle)*radius);
                m.scale.set(1.5+Math.random(), 0.6+Math.random()*1.8, 1.5+Math.random());
                m.rotation.y = Math.random()*Math.PI;
                backgroundGroup.add(m); queueForSpawn(m);
            }
            // Nuvens de Poeira
            for(let i=0; i<35; i++) {
                const cloud = new THREE.Group();
                for(let j=0; j<4; j++) {
                    const p = new THREE.Mesh(new THREE.IcosahedronGeometry(12, 0), materials.cloud);
                    p.position.set((Math.random()-0.5)*20, (Math.random()-0.5)*10, (Math.random()-0.5)*20);
                    p.scale.set(1+Math.random(), 0.5+Math.random(), 1+Math.random());
                    cloud.add(p);
                }
                cloud.position.set((Math.random()-0.5)*700, 110 + Math.random()*50, (Math.random()-0.5)*700);
                cloud.userData.speed = 0.04 + Math.random()*0.06;
                backgroundGroup.add(cloud); animatedObjects.clouds.push(cloud);
            }
            // Turbinas Eólicas Distantes
            for(let i=0; i<12; i++) {
                const a = Math.random()*Math.PI*2, r = 180 + Math.random()*100;
                createWindTurbine(Math.cos(a)*r, Math.sin(a)*r, a + Math.PI/2);
            }
        }

        function buildArenaPerimeter() {
            const wallH = 1.6, netH = 8;
            function seg(l, x, z, ry) {
                const s = new THREE.Group();
                const b = new THREE.Mesh(new THREE.BoxGeometry(l, wallH, 1.5).translate(0, wallH/2, 0), materials.adobe);
                b.castShadow = true; b.receiveShadow = true; s.add(b);
                s.add(new THREE.Mesh(new THREE.PlaneGeometry(l, netH).translate(0, wallH+netH/2, 0), materials.net));
                const nPoles = Math.floor(l / 12);
                const pGeo = new THREE.CylinderGeometry(0.12, 0.12, netH).translate(0, wallH+netH/2, 0);
                for(let i=0; i<=nPoles; i++) {
                    const p = new THREE.Mesh(pGeo, materials.flagPole);
                    p.position.x = -l/2 + (i * (l/nPoles)); p.castShadow = true; s.add(p);
                }
                s.position.set(x, 0, z); s.rotation.y = ry; arenaGroup.add(s); queueForSpawn(s);
            }
            seg(ARENA_LENGTH, 0, -ARENA_WIDTH/2, 0); seg(ARENA_LENGTH, 0, ARENA_WIDTH/2, 0);
            seg(ARENA_WIDTH, -ARENA_LENGTH/2, 0, Math.PI/2); seg(ARENA_WIDTH, ARENA_LENGTH/2, 0, Math.PI/2);
        }

        function addSplatter(parent, x, y, z, rx, ry, rz) {
            const mats = [materials.paintRed, materials.paintBlue];
            const p = new THREE.Mesh(new THREE.CircleGeometry(0.4 + Math.random()*0.5, 8), mats[Math.floor(Math.random()*mats.length)]);
            p.position.set(x, y, z); p.rotation.set(rx, ry, rz);
            p.position.add(new THREE.Vector3(0,0,1).applyEuler(p.rotation).multiplyScalar(0.012));
            parent.add(p);
        }

        function createCactus(x, z, isBg = false) {
            const y = getTerrainHeight(x, z);
            if (y < -1.5) return;
            const cactus = new THREE.Group();
            const h = 4 + Math.random()*4;
            const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.6, h, 8).translate(0, h/2, 0), materials.cactus);
            stem.castShadow = !isBg; stem.receiveShadow = !isBg; cactus.add(stem);
            
            // Braços do Cacto
            const arms = 1 + Math.floor(Math.random()*3);
            for(let i=0; i<arms; i++) {
                const armH = 2 + Math.random()*2;
                const arm = new THREE.Group();
                const seg1 = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, armH, 8).translate(0, armH/2, 0), materials.cactus);
                arm.add(seg1);
                arm.position.y = 1 + Math.random()*(h-2);
                arm.rotation.z = (Math.random() > 0.5 ? 1 : -1) * (0.8 + Math.random()*0.5);
                arm.rotation.y = Math.random()*Math.PI*2;
                cactus.add(arm);
                
                if(!isBg) {
                    arm.userData.baseRotZ = arm.rotation.z;
                    arm.userData.offset = Math.random()*Math.PI;
                    animatedObjects.cactus.push(arm);
                }
            }

            if(!isBg && Math.random() > 0.6) {
                const rY = Math.random()*Math.PI*2;
                addSplatter(cactus, Math.sin(rY)*0.5, 1+Math.random()*3, Math.cos(rY)*0.5, 0, rY, 0);
            }
            cactus.position.set(x, y - 0.5, z);
            if(isBg) backgroundGroup.add(cactus); else arenaGroup.add(cactus);
            queueForSpawn(cactus);
        }

        function createAdobeRuin(x, z, ry) {
            const y = getTerrainHeight(x, z);
            if (y < -1.0) return;
            const r = new THREE.Group();
            const w1 = new THREE.Mesh(new THREE.BoxGeometry(8.5, 5, 1.2).translate(0, 2.5, 0), materials.adobe);
            w1.castShadow = true; w1.receiveShadow = true; r.add(w1);
            if(Math.random() > 0.4) {
                const w2 = new THREE.Mesh(new THREE.BoxGeometry(1.2, 4, 6.5).translate(0, 2, 3.25), materials.adobe);
                w2.position.x = 3.65; w2.castShadow = true; r.add(w2);
            }
            for(let i=0; i<3; i++) addSplatter(w1, (Math.random()-0.5)*6.5, 1+Math.random()*3, 0.61, 0, 0, 0);
            r.position.set(x, y - 1.2, z); r.rotation.y = ry;
            arenaGroup.add(r); queueForSpawn(r);
        }

        function createFlag(x, z, color) {
            const f = new THREE.Group();
            f.add(new THREE.Mesh(new THREE.BoxGeometry(4.5, 1.2, 4.5).translate(0, 0.6, 0), materials.adobe));
            const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 9).translate(0, 4.5, 0), materials.flagPole);
            pole.position.y = 1.2; f.add(pole);
            const flagGeo = new THREE.PlaneGeometry(2.5, 1.5, 6, 3); flagGeo.translate(1.25, -0.75, 0);
            const flag = new THREE.Mesh(flagGeo, new THREE.MeshStandardMaterial({ color: color, side: 2 }));
            flag.position.set(0, 9.5, 0); flag.rotation.y = Math.PI/5;
            flag.userData.baseZ = []; const att = flagGeo.attributes.position;
            for(let i=0; i<att.count; i++) flag.userData.baseZ.push(att.getZ(i));
            flag.userData.offset = x; animatedObjects.flags.push(flag);
            f.add(flag); f.position.set(x, getTerrainHeight(x, z) - 0.8, z);
            arenaGroup.add(f); queueForSpawn(f);
        }

        function createDummy(x, z, mat) {
            const h = 1.85;
            const d = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.35, h, 8).translate(0, h/2, 0), mat);
            d.position.set(x, getTerrainHeight(x, z) - 0.1, z); d.castShadow = true;
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.28, 8, 8), new THREE.MeshStandardMaterial({color: 0x111111}));
            head.position.y = h + 0.15; d.add(head); arenaGroup.add(d); queueForSpawn(d);
        }

        function buildMainTerrain() {
            const segs = 140;
            const geo = new THREE.PlaneGeometry(ARENA_LENGTH*4, ARENA_WIDTH*4, segs, segs);
            const pos = geo.attributes.position;
            for(let i=0; i<pos.count; i++) pos.setZ(i, getTerrainHeight(pos.getX(i), -pos.getY(i)));
            geo.computeVertexNormals();
            groundMesh = new THREE.Mesh(geo, materials.sand);
            groundMesh.rotation.x = -Math.PI/2; groundMesh.receiveShadow = true;
            groundMesh.scale.set(1, 0.001, 1); arenaGroup.add(groundMesh);
            animatedObjects.growingTerrain = groundMesh;

            if (mode === 'woodsball') {
                const wGeo = new THREE.PlaneGeometry(ARENA_LENGTH*4, ARENA_WIDTH*4, 32, 32);
                waterMesh = new THREE.Mesh(wGeo, materials.canyonWater);
                waterMesh.rotation.x = -Math.PI/2; waterMesh.position.y = -2.2;
                const wPos = wGeo.attributes.position; waterMesh.userData.baseZ = [];
                for(let i=0; i<wPos.count; i++) waterMesh.userData.baseZ.push(wPos.getZ(i));
                waterMesh.scale.set(1, 0.001, 1); arenaGroup.add(waterMesh);
            }

            // Vegetação de Background (Deserto)
            for(let i=0; i<700; i++) {
                const ang = Math.random()*Math.PI*2, rad = 100 + Math.random()*160;
                createCactus(Math.cos(ang)*rad, Math.sin(ang)*rad, true);
            }
        }

        function generateLayout() {
            spawnQueue = []; isSpawning = false;
            animatedObjects.cactus = []; animatedObjects.flags = []; animatedObjects.growing = [];
            animatedObjects.clouds = []; animatedObjects.turbines = [];
            while(arenaGroup.children.length > 0) arenaGroup.remove(arenaGroup.children[0]);
            while(backgroundGroup.children.length > 0) backgroundGroup.remove(backgroundGroup.children[0]);
            
            randomizeMapSeed();
            buildSkyBox();
            buildMainTerrain();
            buildArenaPerimeter();

            createFlag(-ARENA_LENGTH/2 + 18, 0, '#dc2626'); createFlag(ARENA_LENGTH/2 - 18, 0, '#2563eb');

            for(let i=-2; i<=2; i++) {
                createDummy(-ARENA_LENGTH/2 + 25, i*5, materials.teamRed);
                createDummy(ARENA_LENGTH/2 - 25, i*5, materials.teamBlue);
            }

            if(mode === 'woodsball') {
                for(let i=0; i<90; i++) {
                    const x = (Math.random()-0.5)*140, z = (Math.random()-0.5)*80;
                    if(Math.abs(x) > 40 || Math.abs(z) > 15) createCactus(x, z);
                }
                for(let i=0; i<15; i++) createAdobeRuin((Math.random()-0.5)*120, (Math.random()-0.5)*70, Math.random()*Math.PI);
            } else {
                for(let i=0; i<35; i++) {
                    const x = 15 + Math.random()*50, z = (Math.random()-0.5)*75, r = Math.random()*Math.PI;
                    createAdobeRuin(x, z, r); createAdobeRuin(-x, -z, r);
                }
            }

            spawnQueue.sort((a,b) => a.position.lengthSq() - b.position.lengthSq());
            isSpawning = true;
        }

        // ==========================================
        // ATMOSFERA PRO (DAY/NIGHT LERP)
        // ==========================================
        const atmoKeys = [
            { t: 0, sky: '#02050f', sun: '#112244', amb: '#01050a', sunInt: 0.1, ambInt: 0.05 },
            { t: 5, sky: '#050a1c', sun: '#4488ff', amb: '#020a15', sunInt: 0.2, ambInt: 0.1 },
            { t: 6.5, sky: '#ff7e33', sun: '#ff9d00', amb: '#ffcc33', sunInt: 0.7, ambInt: 0.3 },
            { t: 12, sky: '#fdf2f0', sun: '#ffffff', amb: '#ffffff', sunInt: 1.4, ambInt: 0.5 },
            { t: 18, sky: '#ff7e33', sun: '#ff4500', amb: '#ffb703', sunInt: 0.8, ambInt: 0.4 },
            { t: 19.5, sky: '#050a1c', sun: '#4488ff', amb: '#020a15', sunInt: 0.2, ambInt: 0.1 },
            { t: 24, sky: '#02050f', sun: '#112244', amb: '#01050a', sunInt: 0.1, ambInt: 0.05 }
        ];

        function updateAtmo() {
            const time = parseFloat(document.getElementById('slider-time').value);
            const weather = document.getElementById('sel-weather').value;
            const h = Math.floor(time), m = Math.floor((time-h)*60);
            document.getElementById('time-display').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;

            let c = atmoKeys[0], n = atmoKeys[1];
            for(let i=0; i<atmoKeys.length-1; i++) {
                if(time >= atmoKeys[i].t && time <= atmoKeys[i+1].t) { c = atmoKeys[i]; n = atmoKeys[i+1]; break; }
            }
            const f = (time - c.t) / (n.t - c.t);
            const skyCol = new THREE.Color(c.sky).lerp(new THREE.Color(n.sky), f);
            const sunCol = new THREE.Color(c.sun).lerp(new THREE.Color(n.sun), f);
            const ambCol = new THREE.Color(c.amb).lerp(new THREE.Color(n.amb), f);
            let sInt = c.sunInt + (n.sunInt - c.sunInt)*f;
            let aInt = c.ambInt + (n.ambInt - c.ambInt)*f;

            const sunAng = ((time - 6) / 12) * Math.PI, rad = 250;
            sunLight.position.set(Math.cos(sunAng)*rad, Math.max(-30, Math.sin(sunAng)*rad), 60);

            worldState.windSpeed = 1.0; worldState.rainIntensity = 0; worldState.sandstormIntensity = 0; worldState.isStorm = false;
            let fogD = 0.0035;

            if(weather === 'clear') { fogD = 0.0015; }
            else if(weather === 'cloudy') { skyCol.lerp(new THREE.Color('#968a7a'), 0.5); sInt *= 0.4; fogD = 0.006; }
            else if(weather === 'wind') { worldState.windSpeed = 6.0; fogD = 0.0045; }
            else if(weather === 'fog') { skyCol.lerp(new THREE.Color('#bdc3c7'), 0.8); sInt *= 0.1; fogD = 0.04; worldState.windSpeed = 0.3; }
            else if(weather === 'rain_light') { skyCol.lerp(new THREE.Color('#788c94'), 0.7); sInt *= 0.2; worldState.rainIntensity = 2; fogD = 0.01; }
            else if(weather === 'storm') { skyCol.set('#1a1a1a'); sInt = 0; aInt *= 0.7; worldState.rainIntensity = 5; worldState.isStorm = true; worldState.windSpeed = 10; fogD = 0.02; }
            else if(weather === 'snow') { skyCol.set('#8b6d5c'); aInt *= 1.5; sInt *= 0.1; worldState.sandstormIntensity = 6; fogD = 0.045; worldState.windSpeed = 12; }

            scene.background = skyCol; scene.fog.color = skyCol; scene.fog.density = fogD;
            sunLight.color = sunCol; sunLight.intensity = sInt; ambientLight.color = ambCol; ambientLight.intensity = aInt;
            materials.cloud.color = skyCol.clone().addScalar(0.2);
            worldState.baseAmbInt = aInt; worldState.baseAmbCol = ambCol.clone();
            
            rainParticles.visible = worldState.rainIntensity > 0;
            sandParticles.visible = worldState.sandstormIntensity > 0;
        }

        // ==========================================
        // EVENTOS E LOOP PRINCIPAL
        // ==========================================
        document.getElementById('btn-woodsball').addEventListener('click', () => { mode = 'woodsball'; generateLayout(); });
        document.getElementById('btn-speedball').addEventListener('click', () => { mode = 'speedball'; generateLayout(); });
        document.getElementById('slider-time').addEventListener('input', updateAtmo);
        document.getElementById('sel-weather').addEventListener('change', updateAtmo);
        document.getElementById('toggle-hud-btn').addEventListener('click', (e) => {
            document.getElementById('ui-panel').classList.toggle('hidden');
            document.getElementById('controls-help').classList.toggle('hidden');
            e.target.innerText = e.target.innerText.includes('OCULTAR') ? 'OPERAÇÃO: MOSTRAR' : 'OPERAÇÃO: OCULTAR';
        });

        generateLayout(); updateAtmo();

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            const time = Date.now() * 0.002;
            const wind = worldState.windSpeed;

            // Transição do terreno
            if(animatedObjects.growingTerrain) {
                animatedObjects.growingTerrain.scale.y += (1 - animatedObjects.growingTerrain.scale.y) * 0.08;
                if(waterMesh) waterMesh.scale.y += (1 - waterMesh.scale.y) * 0.08;
                if(animatedObjects.growingTerrain.scale.y > 0.99) {
                    animatedObjects.growingTerrain.scale.y = 1; if(waterMesh) waterMesh.scale.y = 1;
                    animatedObjects.growingTerrain = null;
                }
            }

            // Spawn Cinematográfico
            if(isSpawning && !animatedObjects.growingTerrain) {
                let pop = Math.ceil(spawnQueue.length / 25);
                while(pop > 0 && spawnQueue.length > 0) {
                    let o = spawnQueue.shift(); o.visible = true; animatedObjects.growing.push(o); pop--;
                }
                if(spawnQueue.length === 0) isSpawning = false;
            }

            for(let i=animatedObjects.growing.length-1; i>=0; i--) {
                let o = animatedObjects.growing[i]; o.scale.lerp(o.userData.targetScale, 0.15);
                if(o.scale.distanceTo(o.userData.targetScale) < 0.01) { o.scale.copy(o.userData.targetScale); animatedObjects.growing.splice(i, 1); }
            }

            // Animação de Cactos e Bandeiras (Vento)
            animatedObjects.cactus.forEach(arm => {
                arm.rotation.z = arm.userData.baseRotZ + Math.sin(time * wind * 0.5 + arm.userData.offset) * (0.05 * Math.min(wind, 4));
            });

            animatedObjects.flags.forEach(f => {
                const pos = f.geometry.attributes.position;
                for(let i=0; i<pos.count; i++) {
                    const vx = pos.getX(i);
                    const wave = Math.sin(time*4*wind + vx*2 + f.userData.offset) * 0.15 * (vx/2);
                    pos.setZ(i, f.userData.baseZ[i] + wave);
                }
                pos.needsUpdate = true;
            });

            // Animação da Água/Miragem
            if(waterMesh && !animatedObjects.growingTerrain) {
                const wPos = waterMesh.geometry.attributes.position;
                for(let i=0; i<wPos.count; i++) {
                    const wave = Math.sin(wPos.getX(i)*0.5 + time) * 0.12 + Math.cos(wPos.getY(i)*0.4 + time*1.2) * 0.1;
                    wPos.setZ(i, waterMesh.userData.baseZ[i] + wave);
                }
                wPos.needsUpdate = true;
            }

            // Elementos de Fundo
            animatedObjects.clouds.forEach(c => { c.position.x -= c.userData.speed * wind; if(c.position.x < -400) c.position.x = 400; });
            animatedObjects.turbines.forEach(r => { r.rotation.z -= 0.02 * wind; });

            // Partículas Climáticas
            if(worldState.rainIntensity > 0) {
                const pos = rainParticles.geometry.attributes.position.array;
                for(let i=1; i<particleCount*3; i+=3) {
                    pos[i] -= 2.0 * worldState.rainIntensity; pos[i-1] -= 0.5 * wind;
                    if(pos[i] < 0) { pos[i] = 200; pos[i-1] = camera.position.x + (Math.random()-0.5)*400; }
                }
                rainParticles.geometry.attributes.position.needsUpdate = true;
            }

            if(worldState.sandstormIntensity > 0) {
                const pos = sandParticles.geometry.attributes.position.array;
                for(let i=0; i<particleCount*3; i+=3) {
                    pos[i] -= 0.5; // Cair devagar
                    pos[i-1] -= 2.5 * worldState.sandstormIntensity; // Arrastado pelo vento
                    if(pos[i-1] < -300) { pos[i-1] = 300; pos[i] = Math.random()*120; }
                }
                sandParticles.geometry.attributes.position.needsUpdate = true;
            }

            // Raios na Tempestade
            if(worldState.isStorm) {
                if(worldState.lightningFlash > 0) {
                    worldState.lightningFlash--;
                    if(worldState.lightningFlash <= 0) {
                        ambientLight.intensity = worldState.baseAmbInt; ambientLight.color.copy(worldState.baseAmbCol);
                    }
                } else if(Math.random() < 0.006) {
                    worldState.lightningFlash = 6 + Math.floor(Math.random()*12);
                    ambientLight.intensity = 3.5; ambientLight.color.set('#ffffff');
                }
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
